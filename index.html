<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusMQTT - MQTT Client</title>
    <script>
      (() => {
        const THEME_KEY = 'mqtt-nexus:theme';
        const LANGUAGE_KEY = 'mqtt-nexus:language';
        const browserLanguage = window.navigator.language?.toLowerCase() || 'en';
        const prefersDark =
          typeof window.matchMedia === 'function' &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;

        let theme = prefersDark ? 'dark' : 'light';
        let language = browserLanguage.startsWith('zh') ? 'zh' : 'en';

        try {
          const savedTheme = window.localStorage.getItem(THEME_KEY);
          if (savedTheme === 'dark' || savedTheme === 'light') {
            theme = savedTheme;
          }
          const savedLanguage = window.localStorage.getItem(LANGUAGE_KEY);
          if (savedLanguage === 'zh' || savedLanguage === 'en') {
            language = savedLanguage;
          }
        } catch (error) {
          console.warn('Failed to read startup preferences', error);
        }

        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        document.documentElement.setAttribute('lang', language === 'zh' ? 'zh-CN' : 'en');
      })();
    </script>
    <link rel="preload" href="/app-icon.png" as="image" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        background: #FAFAFA;
        color: #18181B;
      }

      .dark body {
        background: #09090B;
        color: #fafafa;
      }

      .startup-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #FAFAFA;
      }

      .dark .startup-splash {
        background: #09090B;
      }

      .startup-card {
        width: min(428px, 100%);
        border-radius: 20px;
        border: 1px solid #E4E4E7;
        background: #ffffff;
        box-shadow: 0 20px 56px rgba(9, 9, 11, 0.08);
        padding: 24px 22px 20px;
      }

      .dark .startup-card {
        border-color: #3F3F46;
        background: #18181B;
        box-shadow: 0 20px 56px rgba(0, 0, 0, 0.4);
      }

      .startup-head {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .startup-mark {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        background: #18181B;
        border: 1px solid #3F3F46;
        flex: 0 0 auto;
        overflow: hidden;
      }

      .dark .startup-mark {
        background: #27272A;
        border-color: #52525B;
      }

      .startup-mark img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .startup-name {
        font-size: 18px;
        line-height: 1.2;
        letter-spacing: -0.025em;
        font-weight: 700;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #18181B;
      }

      .dark .startup-name {
        color: #fafafa;
      }

      .startup-progress-track {
        margin-top: 16px;
        height: 4px;
        border-radius: 999px;
        overflow: hidden;
        background: #E4E4E7;
      }

      .dark .startup-progress-track {
        background: #3F3F46;
      }

      .startup-progress-fill {
        height: 100%;
        width: 32%;
        border-radius: inherit;
        background: #4F46E5;
        animation: startup-glide 1.24s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      }

      @keyframes startup-glide {
        from {
          transform: translateX(-72%);
        }
        to {
          transform: translateX(272%);
        }
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #F4F4F5;
      }

      ::-webkit-scrollbar-thumb {
        background: #D4D4D8;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #A1A1AA;
      }

      .dark ::-webkit-scrollbar-track {
        background: #18181B;
      }

      .dark ::-webkit-scrollbar-thumb {
        background: #3F3F46;
      }

      .dark ::-webkit-scrollbar-thumb:hover {
        background: #52525B;
      }
    </style>
  </head>
  <body class="antialiased overflow-hidden h-screen w-screen">
    <div id="startup-splash" class="startup-splash" role="status" aria-live="polite" aria-label="Loading">
      <div class="startup-card">
        <div class="startup-head" aria-hidden="true">
          <div class="startup-mark">
            <img src="/app-icon.png" alt="" />
          </div>
          <div class="startup-name">NexusMQTT</div>
        </div>
        <div class="startup-progress-track" aria-hidden="true">
          <div class="startup-progress-fill"></div>
        </div>
      </div>
    </div>

    <div id="root" class="h-full w-full"></div>

    <script type="module" src="/index.tsx"></script>
  </body>
</html>
